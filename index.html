<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>andredistortion's life</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
:root {
  --radius: 24px; --radius-sm: 16px; --radius-xs: 12px;
  --blue: #4fa3ff; --purple: #b47fff; --teal: #3fdbc8; 
  --rose: #ff6b9d; --amber: #ffb347; --green: #4ade80; --red: #ff6b6b;
}

/* TEMA ESCURO */
[data-theme="dark"] {
  --bg: #0a0a14; --bg2: #0d0d1a;
  --surface: rgba(255,255,255,0.06); --surface-h: rgba(255,255,255,0.11);
  --glass: rgba(255,255,255,0.04); --glass-b: rgba(255,255,255,0.1);
  --text: #f0f0f8; --text-m: rgba(240,240,248,0.55); --text-d: rgba(240,240,248,0.3);
  --card-bg: rgba(255,255,255,0.03); --card-b: rgba(255,255,255,0.06);
  --input-bg: rgba(255,255,255,0.05); --divider: rgba(255,255,255,0.07);
  --shadow: rgba(0,0,0,0.5); --orb: 0.4; --noise: 0.4;
  
  --mc-g-bg: linear-gradient(135deg, rgba(20,30,70,.93) 0%, rgba(10,15,40,.97) 100%);
  --mc-s-bg: linear-gradient(135deg, rgba(30,15,65,.93) 0%, rgba(15,8,40,.97) 100%);
  --mc-i-bg: linear-gradient(135deg, rgba(10,40,35,.93) 0%, rgba(5,20,18,.97) 100%);
  --mc-g-shadow: rgba(79,163,255,.15); --mc-s-shadow: rgba(180,127,255,.15);
  --btn-grad-g: linear-gradient(135deg, #1a5cff 0%, #4fa3ff 50%, #3fdbc8 100%);
}

/* TEMA CLARO */
[data-theme="light"] {
  --bg: #ebf0f5; --bg2: #ffffff;
  --surface: rgba(10, 37, 64, 0.05); --surface-h: rgba(10, 37, 64, 0.1);
  --glass: rgba(255, 255, 255, 0.85); --glass-b: rgba(10, 37, 64, 0.12);
  --text: #0a2540; --text-m: #425b76; --text-d: #8f9fb1;
  --card-bg: rgba(255, 255, 255, 0.6); --card-b: rgba(10, 37, 64, 0.08);
  --input-bg: rgba(10, 37, 64, 0.04); --divider: rgba(10, 37, 64, 0.08);
  --shadow: rgba(10, 37, 64, 0.06); --orb: 0.25; --noise: 0;
  
  --mc-g-bg: #ffffff; --mc-s-bg: #ffffff; --mc-i-bg: #ffffff;
  --mc-g-shadow: rgba(79,163,255,.1); --mc-s-shadow: rgba(180,127,255,.1);
  --btn-grad-g: linear-gradient(135deg, #0a2540 0%, #4fa3ff 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden;}
body { font-family: 'Sora', -apple-system, sans-serif; background: var(--bg); color: var(--text); position: relative; transition: background .4s, color .3s; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,163,255,.14) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, rgba(180,127,255,.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 50% 50%, rgba(63,219,200,.07) 0%, transparent 70%); pointer-events: none; z-index: 0; opacity: var(--orb); transition: opacity .4s; }

/* INDICADORES E LOADING */
.sync-indicator { position: fixed; top: 14px; right: 14px; z-index: 9997; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .05em; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--glass-b); background: var(--glass); color: var(--text-m); transition: all .3s; pointer-events: none; opacity: 0; }
.sync-indicator.show { opacity: 1; pointer-events: auto; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-d); }
.sync-indicator.syncing .sync-dot { background: var(--amber); animation: pulse 1s infinite; }
.sync-indicator.ok .sync-dot { background: var(--green); }
.sync-indicator.err .sync-dot { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity .5s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 48px; height: 48px; border: 3px solid var(--glass-b); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; font-weight: 700; color: var(--text-m); letter-spacing: .05em; }
.loading-brand { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

.app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }
.screen { display: none; flex-direction: column; flex: 1; animation: fadeIn .38s cubic-bezier(.16,1,.3,1); height: 100%; overflow-y: auto;}
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px) scale(.99) } to { opacity: 1; transform: translateY(0) scale(1) } }

.glass { background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--radius); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: background .3s, border-color .3s; }

/* HEADERS */
.screen-header { display: flex; align-items: center; padding: 13px 18px 14px; gap: 12px; flex-shrink: 0; border-bottom: 1px solid transparent; }
.btn-menu { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); background: transparent; border-radius: 14px; transition: background .2s; }
.btn-menu:active { background: var(--surface-h); }
.screen-title { font-size: 21px; font-weight: 800; letter-spacing: -.02em; color: var(--text); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex: 1; }
.slabel { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--text-m); margin-bottom: 10px; padding-left: 2px; }

/* NAVEGAÇÃO SUPERIOR HOME */
.top-nav-area { display: flex; align-items: center; gap: 15px; padding: 15px 20px; background: var(--bg); border-bottom: 1px solid var(--glass-b); flex-shrink: 0;}
.greeting-box { display: flex; flex-direction: column; }
.greeting-text { font-size: 10px; font-weight: 800; color: var(--text-m); text-transform: uppercase; letter-spacing: 0.1em; }
.greeting-title { font-size: 16px; font-weight: 800; line-height: 1.1; }
.page-buttons { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0; scrollbar-width: none; flex: 1;}
.page-buttons::-webkit-scrollbar { display: none; }
.page-btn { padding: 12px 20px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: 16px; font-size: 12px; font-weight: 700; color: var(--text); cursor: pointer; white-space: nowrap; transition: 0.2s; }
.page-btn:active { transform: scale(0.95); background: var(--surface-h); }
.page-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* LAYOUT HOME DIVIDIDO */
#screen-home { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
.home-split-layout { display: flex; flex: 1; overflow: hidden; }
@media (max-width: 800px) { .home-split-layout { flex-direction: column; overflow-y: auto;} }
.home-left { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; border-right: 1px solid var(--glass-b); }
.home-right { flex: 1.2; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.2); }
@media (max-width: 800px) { .home-left { border-right: none; border-bottom: 1px solid var(--glass-b); overflow-y: visible;} .home-right { overflow-y: visible; min-height: 500px;} }

.dashboard-top { display: flex; gap: 15px; }
.widget-weather { flex: 1; background: linear-gradient(135deg, var(--blue), var(--purple)); padding: 20px; border-radius: 20px; color: #fff; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 10px 30px rgba(180,127,255,0.25); }
.ww-time { font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
.ww-date { font-size: 12px; font-weight: 600; opacity: 0.9; }

/* NOTA GERAL */
.widget-score { background: var(--glass); border: 1px solid var(--glass-b); padding: 15px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 110px; box-shadow: 0 8px 32px var(--shadow); }
.score-label { font-size: 10px; font-weight: 800; color: var(--text-m); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; text-align: center;}
.score-val { font-size: 28px; font-weight: 800; color: var(--green); transition: color 0.3s; }

/* RETÂNGULOS HORIZONTAIS NA HOME */
.horizontal-cards { display: flex; flex-direction: column; gap: 12px; }
.h-card { background: var(--glass); border: 1px solid var(--glass-b); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 15px var(--shadow); }
.h-card:active { transform: scale(0.98); }
.h-card-left { display: flex; align-items: center; gap: 15px; }
.h-icon { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--surface-h); border-radius: 12px; }
.h-info { display: flex; flex-direction: column; }
.h-title { font-size: 14px; font-weight: 800; color: var(--text); }
.h-desc { font-size: 11px; font-weight: 600; color: var(--text-m); margin-top: 2px; }
.h-arrow { color: var(--text-d); font-weight: 800; }

.checklist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.checklist-title { font-size: 20px; font-weight: 800; color: var(--rose); }

/* COMPONENTES COMPARTILHADOS */
.fab-back { position: fixed; bottom: 30px; left: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--glass); border: 1px solid var(--glass-b); color: var(--text); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px var(--shadow); cursor: pointer; z-index: 100; transition: transform .2s; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); font-size: 22px; padding-right: 2px; }
.fab-back:active { transform: scale(0.9); }
.w-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.w-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--radius-sm); transition: all 0.2s; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.w-item.done { opacity: 0.6; background: var(--surface-h); }
.w-check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid var(--glass-b); display: flex; align-items: center; justify-content: center; cursor: pointer; color: transparent; font-weight: 900; font-size: 14px; flex-shrink: 0; transition: 0.2s; }
.w-item.done .w-check { background: var(--rose); border-color: var(--rose); color: #fff; }
.cl-item.done .w-check { background: var(--teal); border-color: var(--teal); color: #fff; }
.w-details { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.w-del { color: var(--text-d); font-size: 16px; font-weight: 800; cursor: pointer; padding: 8px; display: inline-block; transition: 0.2s; user-select: none; }
.w-del:active { color: var(--red); transform: scale(0.9); }
.btn-secondary { width: 100%; padding: 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .3s; font-family: inherit; background: var(--glass); border: 1px solid var(--glass-b); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 8px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.btn-secondary:active { transform: scale(.97); background: var(--surface-h); }
.btn-primary { width: 100%; padding: 16px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; transition: all .3s; border: none; font-family: inherit; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary:active { transform: scale(.97); }
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(18px); padding: 16px 28px; border-radius: 16px; font-size: 15px; font-weight: 800; font-family: inherit; opacity: 0; transition: all .38s cubic-bezier(.34,1.56,.64,1); pointer-events: none; white-space: nowrap; z-index: 9999; background: var(--glass); border: 1px solid var(--glass-b); color: var(--text); box-shadow: 0 14px 40px var(--shadow); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.empty-state { text-align: center; padding: 20px; color: var(--text-d); font-size: 12px; font-weight: 600; }

/* CALENDÁRIOS */
.cal-content { padding: 16px 20px 110px; flex: 1; overflow-y: hidden; display: flex; flex-direction: column; }
.cal-layout { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; height: 100%; }
@media (max-width: 900px) { .cal-layout { grid-template-columns: 1fr; overflow-y: auto; display: block; } .cal-right { margin-top: 24px; } }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--radius-sm); padding: 14px 16px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.cal-btn { background: var(--surface-h); border: none; color: var(--text); width: 34px; height: 34px; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
.cal-btn:active { transform: scale(0.9); }
.cal-title { font-size: 15px; font-weight: 800; color: var(--text); text-transform: capitalize; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 24px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--radius); padding: 16px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.cal-dw { text-align: center; font-size: 11px; font-weight: 800; color: var(--text-m); margin-bottom: 8px; }
.cal-day { height: 42px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--text); border: 1px solid transparent; position: relative; }
.cal-day.empty { pointer-events: none; }
.cal-day:active { transform: scale(0.9); }
.cal-day.has-data::after { content: ''; position: absolute; bottom: 5px; width: 4px; height: 4px; background: var(--blue); border-radius: 50%; }
.cal-day.sel { background: var(--blue); color: #fff; border-color: rgba(255,255,255,0.3); font-weight: 800; box-shadow: 0 4px 12px rgba(79,163,255,.3); }
.cal-day.sel.has-data::after { background: #fff; }
.cal-right { display: flex; flex-direction: column; max-height: calc(100vh - 120px); overflow-y: auto; padding-right: 8px; scrollbar-width: none; }
.cal-right::-webkit-scrollbar { display: none; }

/* GLUCOSE DASHBOARD */
#screen-glucose { padding: 0; }
.gcontent { overflow-y: auto; flex: 1; display: flex; flex-direction: column; position: relative; }
.dashboard { display: grid; grid-template-columns: 320px 1fr 1fr; grid-template-rows: minmax(110px, auto) 1fr minmax(70px, auto) minmax(90px, auto); grid-template-areas: "disp table table" "numpad table table" "numpad tags tags" "time hba1c check"; gap: 12px; padding: 16px 20px 24px; flex: 1; min-height: 550px; }
@media (max-width: 800px) { .dashboard { grid-template-columns: minmax(240px, 40%) 1fr 1fr; } }
@media (max-width: 600px) { .dashboard { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto auto auto; grid-template-areas: "disp time" "numpad numpad" "table table" "tags tags" "hba1c check"; min-height: auto; } }

.db-card { background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--radius-sm); padding: 16px; display: flex; flex-direction: column; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.db-disp { grid-area: disp; align-items: center; justify-content: center; background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(79,163,255,.1) 0%, transparent 60%), var(--glass); }
.db-disp .gvalue { font-size: 48px; font-weight: 800; letter-spacing: -.04em; background: linear-gradient(135deg, var(--text) 30%, var(--blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
.db-disp .gunit { font-size: 13px; color: var(--text-m); font-weight: 600; margin-top: 6px; }
.gstatus { display: inline-flex; align-items: center; gap: 5px; padding: 4px 13px; border-radius: 18px; font-size: 11px; font-weight: 700; margin-top: 10px; transition: all 0.2s; }
.s-normal { background: rgba(74,222,128,.13); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
.s-high { background: rgba(255,107,107,.13); color: var(--red); border: 1px solid rgba(255,107,107,.3); }
.s-low { background: rgba(255,179,71,.13); color: var(--amber); border: 1px solid rgba(255,179,71,.3); }
.db-numpad { grid-area: numpad; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 8px; }
.db-numpad .num-btn { background: var(--card-bg); border: 1px solid var(--card-b); border-radius: 12px; font-size: 24px; font-weight: 600; color: var(--text); cursor: pointer; transition: all .14s; display: flex; align-items: center; justify-content: center; height: 100%; min-height: 55px; }
.db-numpad .num-btn:active { transform: scale(.91); background: rgba(79,163,255,.1); border-color: rgba(79,163,255,.3); }
.db-numpad .num-btn.del { background: rgba(255,107,107,.05); border-color: rgba(255,107,107,.15); color: var(--red); }
.db-time { grid-area: time; justify-content: center; }
.db-time label { font-size: 11px; color: var(--text-m); font-weight: 700; margin-bottom: 8px; letter-spacing: .05em; text-transform: uppercase; text-align: center; }
.db-time input { background: var(--input-bg); border: 1px solid var(--glass-b); border-radius: 8px; color: var(--text); font-size: 16px; font-weight: 700; font-family: inherit; padding: 10px; outline: none; text-align: center; width: 100%; transition: 0.2s; }
.db-time input:focus { border-color: var(--blue); }
.db-table { grid-area: table; padding: 14px; }
.tscroll { flex: 1; overflow-y: auto; overflow-x: auto; scrollbar-width: none; border-radius: 8px; border: 1px solid var(--glass-b); background: var(--surface); min-height: 0; }
.tscroll::-webkit-scrollbar { display: none; }
.gtable { width: 100%; border-collapse: collapse; font-size: 12px; }
.gtable th { padding: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-m); background: var(--surface-h); border-bottom: 1px solid var(--glass-b); white-space: nowrap; text-align: left; position: sticky; top: 0; z-index: 10;}
.gtable td { padding: 12px; border-bottom: 1px solid var(--divider); color: var(--text); font-weight: 600; white-space: nowrap; }
.del-btn { color: var(--text-d); font-size: 13px; font-weight: 800; cursor: pointer; padding: 4px; display: inline-block; transition: color 0.2s; user-select: none; }
.del-btn:active { color: var(--red); transform: scale(0.9); }
.db-tags { grid-area: tags; padding: 14px; justify-content: center; }
.tags-scroll { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; padding-bottom: 4px; }
.tags-scroll::-webkit-scrollbar { display: none; }
.tag-pill { white-space: nowrap; flex-shrink: 0; padding: 10px 16px; border-radius: 16px; font-size: 12px; font-weight: 700; border: 1px solid var(--glass-b); background: var(--surface-h); color: var(--text-m); cursor: pointer; transition: all .2s; }
.tag-pill:
