<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>andredistortion's life</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
:root{--radius:24px;--radius-sm:16px;--radius-xs:12px;--blue:#4fa3ff;--purple:#b47fff;--teal:#3fdbc8;--rose:#ff6b9d;--amber:#ffb347;--green:#4ade80;--red:#ff6b6b;}
[data-theme="dark"]{--bg:#0a0a14;--bg2:#0d0d1a;--surface:rgba(255,255,255,0.06);--surface-h:rgba(255,255,255,0.11);--glass:rgba(255,255,255,0.04);--glass-b:rgba(255,255,255,0.1);--text:#f0f0f8;--text-m:rgba(240,240,248,0.55);--text-d:rgba(240,240,248,0.3);--card-bg:rgba(255,255,255,0.03);--card-b:rgba(255,255,255,0.06);--input-bg:rgba(255,255,255,0.05);--divider:rgba(255,255,255,0.07);--shadow:rgba(0,0,0,0.5);--orb:0.4;}
[data-theme="light"]{--bg:#ebf0f5;--bg2:#ffffff;--surface:rgba(10,37,64,0.05);--surface-h:rgba(10,37,64,0.1);--glass:rgba(255,255,255,0.85);--glass-b:rgba(10,37,64,0.12);--text:#0a2540;--text-m:#425b76;--text-d:#8f9fb1;--card-bg:rgba(255,255,255,0.6);--card-b:rgba(10,37,64,0.08);--input-bg:rgba(10,37,64,0.04);--divider:rgba(10,37,64,0.08);--shadow:rgba(10,37,64,0.06);--orb:0.25;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative;transition:background .4s,color .3s;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(79,163,255,.14) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(180,127,255,.12) 0%,transparent 60%);pointer-events:none;z-index:0;opacity:var(--orb);transition:opacity .4s;}
.sync-indicator{position:fixed;top:14px;right:14px;z-index:9997;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;backdrop-filter:blur(10px);border:1px solid var(--glass-b);background:var(--glass);color:var(--text-m);transition:all .3s;pointer-events:none;opacity:0;}
.sync-indicator.show{opacity:1;pointer-events:auto;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-d);}
.sync-indicator.syncing .sync-dot{background:var(--amber);animation:pulse 1s infinite;}
.sync-indicator.ok .sync-dot{background:var(--green);}
.sync-indicator.err .sync-dot{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-spinner{width:48px;height:48px;border:3px solid var(--glass-b);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;font-weight:700;color:var(--text-m);letter-spacing:.05em;}
.loading-brand{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.loading-offline-btn{margin-top:8px;padding:10px 24px;border-radius:14px;border:1px solid var(--glass-b);background:var(--glass);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;flex:1;animation:fadeIn .38s cubic-bezier(.16,1,.3,1);}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}

/* TOP NAV */
.top-nav{display:flex;align-items:center;gap:5px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--glass-b);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:sticky;top:0;z-index:500;}
.top-nav::-webkit-scrollbar{display:none;}
.top-nav-brand{font-size:12px;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;flex-shrink:0;margin-right:4px;}
.top-nav-div{width:1px;height:18px;background:var(--glass-b);flex-shrink:0;margin:0 3px;}
.nav-btn{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-m);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .18s;}
.nav-btn:hover{background:var(--surface-h);color:var(--text);}
.nav-btn.active{background:rgba(79,163,255,.12);color:var(--blue);border-color:rgba(79,163,255,.35);}

/* SCREEN HEADERS */
.screen-header{display:flex;align-items:center;padding:12px 18px 12px;gap:12px;flex-shrink:0;border-bottom:1px solid var(--glass-b);}
.screen-title{font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--text);display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;}
.slabel{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-m);margin-bottom:10px;padding-left:2px;}

/* DRAG & DROP WIDGETS */
.drag-handle { cursor: grab; color: var(--text-d); font-size: 16px; padding: 4px; user-select: none; transition: color 0.2s; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
.drag-handle:hover { color: var(--text); }
.drag-handle:active { cursor: grabbing; }
.sortable-ghost { opacity: 0.4; outline: 2px dashed var(--blue); border-radius: var(--radius); }
.widget-draggable { position: relative; }
.widget-header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }

/* SELECT MODERNO */
select.modern-sel {
  appearance: none; -webkit-appearance: none;
  background-color: var(--input-bg); border: 1px solid var(--glass-b);
  border-radius: 10px; color: var(--text);
  padding: 10px 36px 10px 14px; font-size: 13px; font-weight: 700; font-family: inherit;
  background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%238f9fb1%22%20stroke-width%3D%222.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
  background-repeat: no-repeat; background-position: right 10px center;
  cursor: pointer; transition: border-color 0.2s; outline:none;
}
select.modern-sel:focus { border-color: var(--blue); }
select.modern-sel option { background-color: var(--bg2); color: var(--text); font-weight:700; }

/* FAB */
.fab-back{position:fixed;bottom:30px;left:24px;width:52px;height:52px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-b);color:var(--text);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px var(--shadow);cursor:pointer;z-index:100;transition:transform .2s;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);font-size:20px;}
.fab-back:active{transform:scale(0.9);}
.fab-save{position:fixed;bottom:30px;right:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#ff6b9d);color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.1);box-shadow:0 8px 24px rgba(180,127,255,.35);cursor:pointer;z-index:100;transition:transform .2s;font-family:inherit;}
.fab-save:active{transform:scale(.9);}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px);}
.sidebar-overlay.open{opacity:1;pointer-events:auto;}
.sidebar{position:fixed;top:0;left:-320px;width:280px;height:100%;background:var(--bg2);border-right:1px solid var(--glass-b);z-index:9999;transition:left 0.3s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;box-shadow:10px 0 30px rgba(0,0,0,0.2);}
.sidebar.open{left:0;}
.sb-header{padding:28px 18px 18px;display:flex;gap:14px;align-items:center;background:var(--glass);border-bottom:1px solid var(--glass-b);}
.sb-avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;}
.sb-name{font-size:15px;font-weight:800;color:var(--text);}
.sb-quick-stats{display:flex;padding:14px;gap:8px;background:var(--bg);border-bottom:1px solid var(--glass-b);}
.sb-q-card{flex:1;background:var(--glass);border:1px solid var(--glass-b);border-radius:12px;padding:10px 6px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:3px;}
.sb-q-val{font-size:14px;font-weight:800;color:var(--text);}
.sb-q-lbl{font-size:9px;font-weight:700;color:var(--text-m);text-transform:uppercase;}
.sb-theme-box{padding:14px;border-bottom:1px solid var(--glass-b);}
.theme-switcher{display:flex;gap:6px;background:var(--glass);border:1px solid var(--glass-b);border-radius:14px;padding:4px;}
.theme-btn{flex:1;padding:7px 5px;border-radius:10px;border:none;font-size:10px;font-weight:700;cursor:pointer;transition:all .22s;color:var(--text-m);background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
.theme-btn.active{background:var(--surface-h);color:var(--text);box-shadow:0 2px 8px var(--shadow);}
.sb-nav{padding:14px 10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:3px;}
.sb-link{padding:12px 14px;border-radius:12px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:0.2s;display:flex;justify-content:space-between;align-items:center;}
.sb-link:active{background:var(--surface-h);}
.sb-link-left{display:flex;align-items:center;gap:10px;}
.sb-chev{font-size:10px;transition:transform 0.3s;color:var(--text-m);}
.sb-link.expanded .sb-chev{transform:rotate(180deg);}
.sb-sub{max-height:0;overflow:hidden;transition:max-height 0.3s ease;display:flex;flex-direction:column;margin-left:14px;border-left:2px solid var(--glass-b);}
.sb-sub.open{max-height:300px;}
.sb-sub-link{padding:10px 14px;color:var(--text-m);font-size:12px;font-weight:600;cursor:pointer;transition:0.2s;border-radius:0 12px 12px 0;display:flex;align-items:center;gap:8px;}
.sb-sub-link::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--text-d);}
.sb-sub-link:active{background:var(--surface-h);color:var(--text);}
.notif-badge{padding:4px 8px;border-radius:8px;font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.nb-warn{background:rgba(255,179,71,.15);color:var(--amber);border:1px solid rgba(255,179,71,.3);}
.nb-err{background:rgba(255,107,107,.15);color:var(--red);border:1px solid rgba(255,107,107,.3);}
.nb-ok{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);}

/* HOME */
#screen-home{padding:0;overflow-y:auto;}
.home-inner{padding:14px 18px 40px;}
.home-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.home-greeting{font-size:11px;font-weight:600;color:var(--text-m);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.home-title{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.1;background:linear-gradient(135deg,var(--text) 0%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-layout{display:flex;flex-direction:column;gap:16px;}
@media(min-width:860px){.home-layout{flex-direction:row;align-items:flex-start;gap:22px;}.home-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px;}.home-right{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;}}
.widget-weather{background:linear-gradient(135deg,var(--blue),var(--purple));padding:20px;border-radius:22px;color:#fff;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 24px rgba(180,127,255,0.2);position:relative;overflow:hidden;}
.widget-weather::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;background:rgba(255,255,255,0.1);border-radius:50%;filter:blur(20px);pointer-events:none;}
.ww-time{font-size:38px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:4px;}
.ww-date{font-size:12px;font-weight:600;opacity:0.9;}
.widget-metrics{background:var(--glass);border:1px solid var(--glass-b);padding:18px;border-radius:22px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.wm-header{font-size:13px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.wm-bar-group{margin-bottom:11px;}
.wm-bar-group:last-child{margin-bottom:0;}
.wm-label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--text-m);margin-bottom:5px;}
.wm-val{color:var(--text);font-weight:800;}
.wm-bar{height:6px;background:var(--surface-h);border-radius:3px;overflow:hidden;}
.wm-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);}
.nota-geral-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(79,163,255,.13),rgba(180,127,255,.13));border:1px solid rgba(79,163,255,.3);border-radius:13px;padding:9px 13px;min-width:64px;flex-shrink:0;}
.ng-val{font-size:20px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ng-label{font-size:8px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-m);margin-top:2px;}
.menu-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:480px){.menu-cards{grid-template-columns:repeat(2,1fr);}}
.menu-card{display:flex;flex-direction:row;align-items:center;padding:12px 13px;min-height:65px;border-radius:16px;position:relative;overflow:hidden;cursor:pointer;transition:transform .22s;background:var(--glass);border:1px solid var(--glass-b);box-shadow:0 3px 16px var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.menu-card:active{transform:scale(.95);}
.mc-icon{width:38px;height:38px;background:var(--surface-h);border:1px solid var(--glass-b);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-right:11px;flex-shrink:0;z-index:1;}
.mc-text{z-index:1;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.mc-title{font-size:12px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-desc{font-size:9px;font-weight:600;color:var(--text-m);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-orb{position:absolute;border-radius:50%;filter:blur(30px);pointer-events:none;width:80px;height:80px;top:-10px;right:-10px;opacity:0.3;}

/* GRADE HORÁRIA WIDGET */
.sched-widget{background:var(--glass);border:1px solid var(--glass-b);border-radius:22px;padding:18px;backdrop-filter:blur(16px);overflow-x:auto;}
.sched-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sched-badge{background:#63839c;color:#fff;font-size:10px;font-weight:800;padding:4px 8px;border-radius:6px;text-transform:uppercase;}
.sched-grid{display:grid;grid-template-columns:55px repeat(5, minmax(100px, 1fr));gap:4px;min-width:600px;}
.sched-cell{background:var(--surface-h);border-radius:6px;padding:6px;font-size:10px;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:40px;color:var(--text-m);font-weight:700;transition:background 0.3s;}
.sched-header-cell{background:var(--surface);color:var(--text);font-weight:800;}
.sched-block{background:#5cb85c;color:#fff;border-radius:6px;padding:8px 6px;font-size:9px;font-weight:800;text-align:center;display:flex;flex-direction:column;justify-content:center;line-height:1.3;box-shadow:0 2px 8px rgba(92,184,92,0.3);}
.sched-cell.current-day { background: rgba(180,127,255,0.15); border: 1px solid rgba(180,127,255,0.4); color:var(--purple); }

/* HOME CHECKLIST & CARDS */
.home-checklist-card{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--radius);padding:18px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.hc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.hc-title{font-size:14px;font-weight:800;color:var(--text);}
.hc-date{font-size:10px;font-weight:700;color:var(--text-m);margin-top:2px;}
.hc-btn-all{font-size:10px;font-weight:700;color:var(--blue);background:rgba(79,163,255,.1);border:1px solid rgba(79,163,255,.3);border-radius:8px;padding:4px 9px;cursor:pointer;font-family:inherit;}
.hc-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;background:var(--surface-h);margin-bottom:6px;transition:all .2s;}
.hc-item.done{opacity:.6;}
.hc-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--glass-b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:900;color:transparent;flex-shrink:0;transition:.2s;}
.hc-item.done .hc-check{background:var(--teal);border-color:var(--teal);color:#fff;}
.hc-item-auto.done .hc-check{background:var(--green);border-color:var(--green);}
.hc-item-auto .hc-check{cursor:default;}
.hc-label{font-size:12px;font-weight:700;color:var(--text);flex:1;}
.hc-sublabel{font-size:10px;font-weight:600;color:var(--text-m);}

/* GLUCOSE DASHBOARD */
#screen-glucose{padding:0;}
.gcontent{overflow-y:auto;flex:1;display:flex;flex-direction:column;position:relative;}
.dashboard{display:grid;grid-template-columns:300px 1fr 1fr;grid-template-rows:minmax(100px,auto) 1fr minmax(60px,auto) minmax(80px,auto);grid-template-areas:"disp table table" "numpad table table" "numpad tags tags" "time hba1c check";gap:11px;padding:14px 18px 20px;flex:1;min-height:520px;}
@media(max-width:800px){.dashboard{grid-template-columns:minmax(220px,40%) 1fr 1fr;}}
@media(max-width:600px){.dashboard{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto auto auto;grid-template-areas:"disp time" "numpad numpad" "table table" "tags tags" "hba1c check";min-height:auto;}}
.db-card{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--radius-sm);padding:14px;display:flex;flex-direction:column;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.db-disp{grid-area:disp;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(79,163,255,.1) 0%,transparent 60%),var(--glass);}
.db-disp .gvalue{font-size:46px;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,var(--text) 30%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.db-disp .gunit{font-size:12px;color:var(--text-m);font-weight:600;margin-top:5px;}

/* AQUI ESTAVA O CÓDIGO CORTADO (corrigido abaixo): */
.gstatus{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:12px;font-size:11px;font-weight:700;background:var(--surface-h);color:var(--text);}

/* --- NOVOS ESTILOS: TELA PLANEJAMENTO --- */
#screen-planejamento { padding: 0; overflow-y: auto;
